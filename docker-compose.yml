services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: linkbelli
      POSTGRES_USER: linkbelli
      POSTGRES_PASSWORD: linkbelli
    ports:
      # 5433 on the host: a native PostgreSQL 17 service already occupies 5432
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkbelli"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
