services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: linkbelli
      POSTGRES_USER: linkbelli
      POSTGRES_PASSWORD: linkbelli
    ports:
      # 5433 on the host: a native PostgreSQL 17 service already occupies 5432
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkbelli"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Development here so the local full-stack run keeps Scalar and skips HTTPS redirection.
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=linkbelli;Username=linkbelli;Password=linkbelli
      Database__MigrateAtStartup: "true"
    ports:
      - "5180:8080"

  web:
    build: ./web
    depends_on:
      - api
    environment:
      # BFF talks to the API over the compose network; the browser only ever sees the web app.
      API_BASE_URL: http://api:8080
      # adapter-node's public origin (for form-action CSRF checks) = how the browser reaches it.
      ORIGIN: http://localhost:5173
      # Local run is plain HTTP, so don't mark auth cookies Secure (browser would drop them).
      COOKIE_SECURE: "false"
    ports:
      - "5173:3000"

volumes:
  pgdata:
