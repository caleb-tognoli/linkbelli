name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Unit tests
        run: dotnet test tests/Linkbelli.Tests/Linkbelli.Tests.csproj --no-build -c Release

      # Fail the build on known-vulnerable (incl. transitive) NuGet dependencies.
      - name: Vulnerable dependency scan
        run: |
          dotnet restore
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln.log
          ! grep -q -E '>\s*(Low|Moderate|High|Critical)' vuln.log

  integration-test:
    runs-on: ubuntu-latest
    # GitHub-hosted ubuntu runners ship Docker, which Testcontainers needs.
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      # Real-Postgres suite: auth, scope enforcement, visibility, rate limiting,
      # admin moderation, NSFW, SSRF — the authz/IDOR safety net.
      - name: Integration tests
        run: dotnet test tests/Linkbelli.IntegrationTests/Linkbelli.IntegrationTests.csproj --no-build -c Release

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build
